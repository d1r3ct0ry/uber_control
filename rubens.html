<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Resumo Diário Uber/99</title>
<style>
body{
    font-family:Arial;
    max-width:800px;
    margin:20px auto;
    padding:20px;
}
input{
    padding:8px;
    margin:5px;
}
button{
    padding:8px 15px;
}
table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}
th,td{
    border:1px solid #ddd;
    padding:10px;
}
</style>
</head>
<body>

<h2>Resumo Diário</h2>

<input type="date" id="data">
<input type="number" id="uber" placeholder="Uber">
<input type="number" id="nove9" placeholder="99">
<input type="number" id="gastos" placeholder="Gastos">

<button onclick="adicionar()">Salvar</button>

<h3 id="totalMes">Total mês: R$ 0,00</h3>

<table>
<thead>
<tr>
<th>Data</th>
<th>Uber</th>
<th>99</th>
<th>Gastos</th>
<th>Lucro</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>

<script>
let dados = JSON.parse(localStorage.getItem("corridas")) || [];

function adicionar(){
    let registro = {
        data:data.value,
        uber:Number(uber.value),
        nove9:Number(nove9.value),
        gastos:Number(gastos.value)
    };

    dados.push(registro);
    localStorage.setItem("corridas",JSON.stringify(dados));

    render();
}

function render(){
    let html="";
    let totalMes=0;

    dados.forEach(r=>{
        let lucro = r.uber + r.nove9 - r.gastos;
        totalMes += lucro;

        html += `
        <tr>
            <td>${r.data}</td>
            <td>R$ ${r.uber.toFixed(2)}</td>
            <td>R$ ${r.nove9.toFixed(2)}</td>
            <td>R$ ${r.gastos.toFixed(2)}</td>
            <td>R$ ${lucro.toFixed(2)}</td>
        </tr>`;
    });

    tabela.innerHTML = html;
    totalMes.innerHTML = `Total mês: R$ ${totalMes.toFixed(2)}`;
}

render();
</script>

</body>
</html>
