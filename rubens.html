<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Rubens do Dudu Financeiro</title>
<style>
body{font-family:Inter,Arial,sans-serif;background:#0f172a;color:#fff;max-width:900px;margin:auto;padding:16px}
.card{background:#1e293b;border-radius:18px;padding:16px;margin:10px 0}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.big{font-size:36px;font-weight:700;color:#22c55e}
.small{color:#94a3b8}
input,select{width:100%;padding:10px;border-radius:10px;border:none;margin:5px 0}
button{padding:12px 16px;border:none;border-radius:12px;background:#22c55e;color:white;font-weight:bold;cursor:pointer}
table{width:100%;border-collapse:collapse}
td,th{padding:8px;border-bottom:1px solid #334155}
.red{color:#ef4444}.green{color:#22c55e}
</style>
</head>
<body>
<h1>🚗 Rubens do Dudu Financeiro</h1>

<div class="card">
<div class="small">Saldo Atual</div>
<div class="big" id="saldo">R$ 0,00</div>
</div>

<div class="grid">
<div class="card"><div class="small">Uber</div><h2 id="uberTotal">R$ 0</h2></div>
<div class="card"><div class="small">99</div><h2 id="noveTotal">R$ 0</h2></div>
<div class="card"><div class="small">Gastos</div><h2 class="red" id="gastosTotal">R$ 0</h2></div>
<div class="card"><div class="small">Lançamentos</div><h2 id="qtd">0</h2></div>
</div>

<div class="card">
<h3>Novo lançamento</h3>
<input type="date" id="data">
<select id="tipo">
<option>Uber</option>
<option>99</option>
<option>Gasto</option>
</select>
<input type="number" id="valor" placeholder="Valor">
<button onclick="add()">Salvar</button>
</div>

<div class="card">
<h3>Histórico</h3>
<table>
<thead><tr><th>Data</th><th>Tipo</th><th>Valor</th><th></th></tr></thead>
<tbody id="lista"></tbody>
</table>
</div>

<script>
let dados=JSON.parse(localStorage.getItem("rubens_dudu")||"[]");
document.getElementById("data").value=new Date().toISOString().split("T")[0];

function moeda(v){return v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}

function salvar(){
 localStorage.setItem("rubens_dudu",JSON.stringify(dados));
 render();
}

function add(){
 let item={
  id:Date.now(),
  data:data.value,
  tipo:tipo.value,
  valor:Number(valor.value||0)
 };
 if(item.valor<=0)return;
 dados.unshift(item);
 valor.value="";
 salvar();
}

function del(id){
 dados=dados.filter(x=>x.id!==id);
 salvar();
}

function render(){
 let uber=0,nove=0,gastos=0;
 lista.innerHTML="";
 dados.forEach(x=>{
  if(x.tipo==="Uber") uber+=x.valor;
  else if(x.tipo==="99") nove+=x.valor;
  else gastos+=x.valor;

  lista.innerHTML+=`
  <tr>
   <td>${x.data}</td>
   <td>${x.tipo}</td>
   <td class="${x.tipo==='Gasto'?'red':'green'}">${moeda(x.valor)}</td>
   <td><button onclick="del(${x.id})">X</button></td>
  </tr>`;
 });

 uberTotal.innerText=moeda(uber);
 noveTotal.innerText=moeda(nove);
 gastosTotal.innerText=moeda(gastos);
 saldo.innerText=moeda((uber+nove)-gastos);
 qtd.innerText=dados.length;
}
render();
</script>
</body>
</html>
